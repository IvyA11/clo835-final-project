<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee Information</title>
    <style>
        body {
            /* This links to the image we fixed in S3 */
            background-image: url('/static/bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(0, 0, 0, 0.75); /* Dark transparent box */
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }
        h1 { color: #00d4ff; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            height: 35px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            padding-left: 10px;
            box-sizing: border-box;
        }
        .btn-group { margin-top: 20px; }
        button {
            background: #555;
            height: 45px;
            width: 100%;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.3s;
        }
        button:hover { background: #777; }
        a { color: #00d4ff; text-decoration: none; display: inline-block; margin-top: 15px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Database</h1>
        <form action="/addemp" method="POST" enctype="multipart/form-data">
            
            <div class="input-group">
                <label>Employee ID:</label>
                <input type="number" name="emp_id" autofocus required>
            </div>

            <div class="input-group">
                <label>First Name:</label>
                <input type="text" name="first_name" required>
            </div>

            <div class="input-group">
                <label>Last Name:</label>
                <input type="text" name="last_name" required>
            </div>

            <div class="input-group">
                <label>Primary Skills:</label>
                <input type="text" name="primary_skill">
            </div>

            <div class="input-group">
                <label>Location:</label>
                <input type="text" name="location">
            </div>

            <div class="btn-group">
                <button type="submit">UPDATE DATABASE</button>
                <button type="submit" formaction="/getemp">GET EMPLOYEE INFORMATION</button>
            </div>
        </form>
        
        <a href="/">Back to Home</a> | <a href="/about">About Us</a>
    </div>
</body>
</html>
