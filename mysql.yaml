apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: final
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ebs-sc  # <--- ADD THIS LINE
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: final
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: mysql-secret, key: DBPWD } }
        - name: MYSQL_DATABASE
          valueFrom: { configMapKeyRef: { name: app-config, key: DATABASE } }
        volumeMounts:
        - name: storage
          mountPath: /var/lib/mysql
      volumes:
      - name: storage
        persistentVolumeClaim: { claimName: mysql-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: final
spec:
  ports: [{ port: 3306 }]
  selector: { app: mysql }
